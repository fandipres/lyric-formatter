<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Lyric Formatter - Editor Lirik HTML</title>
    <meta name="description" content="Alat praktis untuk merapikan lirik lagu, menyesuaikan kapitalisasi, membersihkan tanda baca, dan mengubahnya ke format HTML.">
    <meta name="keywords" content="lyric formatter, editor lirik, konversi html lirik, eyd lirik, lyricspedia, worshipedia">
    <meta name="author" content="Lyric Formatter">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        textarea { resize: none; }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col relative">

    <!-- Header -->
    <header class="bg-white shadow-sm p-4 text-center border-b border-slate-200">
        <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">Lyric Formatter</h1>
        <p class="text-sm text-slate-500 mt-1">Alat bantu untuk merapikan dan memformat lirik lagu</p>
    </header>

    <!-- Modal Pengaturan -->
    <div id="configModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-50 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-xl w-11/12 max-w-md overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-700">Pengaturan Kapitalisasi</h3>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6">
                <p class="text-sm font-medium text-slate-700 mb-3">Kata yang selalu berawalan kapital:</p>
                <div class="grid grid-cols-3 gap-3 mb-6" id="checkboxGroup">
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Tuhan" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Tuhan</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Allah" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Allah</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Yesus" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Yesus</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Kristus" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Kristus</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Roh Kudus" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Roh Kudus</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Bapa" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Bapa</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Engkau" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Engkau</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Dia" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Dia</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Nya" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Nya</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Mu" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Mu</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="Ku" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>Ku</span></label>
                    <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" value="I" class="eyd-cb rounded text-indigo-600 focus:ring-indigo-500" checked><span>I (Inggris)</span></label>
                </div>

                <p class="text-sm font-medium text-slate-700 mb-2">Tambahan kata lain:</p>
                <p class="text-xs text-slate-500 mb-2">Pisahkan dengan koma (contoh: Haleluya, Hosana, Amin)</p>
                <input type="text" id="customWords" class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="Ketik kata tambahan di sini...">
            </div>

            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end">
                <button onclick="toggleModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition duration-200">
                    Simpan & Tutup
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow p-4 md:p-6 max-w-[1600px] mx-auto w-full">
        
        <!-- Pengecekan Judul Lagu -->
        <div class="bg-white p-5 rounded-lg shadow-sm border border-slate-200 mb-6">
            <h2 class="text-sm font-semibold text-slate-700 mb-3">Rapikan Judul Lagu</h2>
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-grow w-full">
                    <input type="text" id="rawTitle" placeholder="Ketik judul lagu (contoh: bapa yang kekal)..." class="w-full border border-slate-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
                <button onclick="formatTitle()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-6 rounded-lg transition duration-200 shrink-0 text-sm">
                    Format Judul
                </button>
                <div class="flex-grow w-full relative">
                    <input type="text" id="formattedTitle" readonly placeholder="Hasilnya akan muncul di sini..." class="w-full border border-slate-300 rounded-lg p-2.5 text-sm bg-slate-50 text-slate-700 focus:outline-none pr-16">
                    <button onclick="copyTitle()" id="copyTitleBtn" class="absolute right-2 top-2 bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded text-xs font-medium text-slate-700 transition">Salin</button>
                </div>
            </div>
        </div>

        <!-- Area Kerja Lirik -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
            
            <!-- Kolom 1 -->
            <div class="flex flex-col h-[60vh] lg:h-[65vh]">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-semibold text-slate-700">1. Lirik Mentah</h2>
                    <button onclick="toggleModal()" class="text-xs bg-white border border-slate-300 hover:bg-slate-50 px-3 py-1.5 rounded-lg text-slate-700 font-medium transition duration-200 flex items-center gap-1 shadow-sm">
                        <svg class="w-3.5 h-3.5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        Opsi Kata
                    </button>
                </div>
                <textarea id="col1" class="flex-grow p-4 border border-slate-300 rounded-lg shadow-inner focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm" placeholder="Tempelkan lirik yang ingin diedit di sini..."></textarea>
                <button onclick="processToCol2()" class="mt-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200">
                    Bersihkan & Rapikan ➔
                </button>
            </div>

            <!-- Kolom 2 -->
            <div class="flex flex-col h-[60vh] lg:h-[65vh]">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-semibold text-slate-700">2. Hasil Teks</h2>
                </div>
                <textarea id="col2" class="flex-grow p-4 border border-slate-300 rounded-lg shadow-inner focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm" placeholder="Lirik yang sudah bersih dari tanda baca dan rapi akan tampil di sini..."></textarea>
                <button onclick="processToCol3()" class="mt-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200">
                    Ubah ke HTML ➔
                </button>
            </div>

            <!-- Kolom 3 -->
            <div class="flex flex-col h-[60vh] lg:h-[65vh]">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-semibold text-slate-700">3. Kode HTML</h2>
                </div>
                <textarea id="col3" class="flex-grow p-4 border border-slate-300 rounded-lg bg-slate-50 shadow-inner focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-slate-700 font-mono text-sm" readonly placeholder="Kode HTML yang siap disalin akan muncul di sini..."></textarea>
                <button onclick="copyToClipboard()" id="copyBtn" class="mt-3 bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 flex justify-center items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Salin Kode HTML
                </button>
            </div>

        </div>
    </main>

    <script>
        function formatTitle() {
            const rawTitle = document.getElementById('rawTitle').value;
            if (!rawTitle.trim()) return;

            const formatted = rawTitle.toLowerCase().split(' ').map(word => {
                if(word.length === 0) return '';
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');

            document.getElementById('formattedTitle').value = formatted;
        }

        function copyTitle() {
            const titleField = document.getElementById('formattedTitle');
            if (!titleField.value.trim()) return;

            titleField.select();
            titleField.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(titleField.value).then(() => {
                const btn = document.getElementById('copyTitleBtn');
                btn.innerText = 'Tersalin!';
                btn.classList.add('bg-emerald-100', 'text-emerald-700');
                
                setTimeout(() => {
                    btn.innerText = 'Salin';
                    btn.classList.remove('bg-emerald-100', 'text-emerald-700');
                }, 2000);
            });
        }

        function toggleModal() {
            const modal = document.getElementById('configModal');
            modal.classList.toggle('hidden');
        }

        function getCapitalizationWords() {
            let words = [];
            
            const checkboxes = document.querySelectorAll('.eyd-cb:checked');
            checkboxes.forEach(cb => {
                words.push(cb.value);
            });

            const customInput = document.getElementById('customWords').value;
            if (customInput.trim() !== '') {
                const customArray = customInput.split(',').map(w => w.trim()).filter(w => w.length > 0);
                words = words.concat(customArray);
            }

            return words;
        }

        function processToCol2() {
            let text = document.getElementById('col1').value;
            if (!text.trim()) return;

            text = text.replace(/[,.;]/g, '');

            let lines = text.split('\n');
            lines = lines.map(line => {
                let trimmed = line.trim().toLowerCase();
                if(trimmed.length > 0) {
                    return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
                }
                return trimmed;
            });
            text = lines.join('\n');

            const wordsToCapitalize = getCapitalizationWords();

            wordsToCapitalize.forEach(word => {
                if(word.length > 0) {
                    const regex = new RegExp(`\\b${word}\\b`, 'gi');
                    text = text.replace(regex, (match) => {
                        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                    });
                }
            });

            document.getElementById('col2').value = text;
        }

        function encodeAccents(str) {
            const map = {
                'á':'&aacute;', 'à':'&agrave;', 'â':'&acirc;', 'ä':'&auml;', 'ã':'&atilde;', 'å':'&aring;',
                'é':'&eacute;', 'è':'&egrave;', 'ê':'&ecirc;', 'ë':'&euml;',
                'í':'&iacute;', 'ì':'&igrave;', 'î':'&icirc;', 'ï':'&iuml;',
                'ó':'&oacute;', 'ò':'&ograve;', 'ô':'&ocirc;', 'ö':'&ouml;', 'õ':'&otilde;',
                'ú':'&uacute;', 'ù':'&ugrave;', 'û':'&ucirc;', 'ü':'&uuml;',
                'ñ':'&ntilde;', 'ç':'&ccedil;',
                'Á':'&Aacute;', 'À':'&Agrave;', 'Â':'&Acirc;', 'Ä':'&Auml;', 'Ã':'&Atilde;', 'Å':'&Aring;',
                'É':'&Eacute;', 'È':'&Egrave;', 'Ê':'&Ecirc;', 'Ë':'&Euml;',
                'Í':'&Iacute;', 'Ì':'&Igrave;', 'Î':'&Icirc;', 'Ï':'&Iuml;',
                'Ó':'&Oacute;', 'Ò':'&Ograve;', 'Ô':'&Ocirc;', 'Ö':'&Ouml;', 'Õ':'&Otilde;',
                'Ú':'&Uacute;', 'Ù':'&Ugrave;', 'Û':'&Ucirc;', 'Ü':'&Uuml;',
                'Ñ':'&Ntilde;', 'Ç':'&Ccedil;'
            };
            return str.replace(/[áàâäãåéèêëíìîïóòôöõúùûüñçÁÀÂÄÃÅÉÈÊËÍÌÎÏÓÒÔÖÕÚÙÛÜÑÇ]/g, match => map[match]);
        }

        function processToCol3() {
            let text = document.getElementById('col2').value;
            if (!text.trim()) return;

            text = encodeAccents(text);

            let lines = text.split('\n');
            let htmlOutput = lines.map(line => {
                return line + '<br />';
            }).join('\n');

            document.getElementById('col3').value = htmlOutput;
        }

        function copyToClipboard() {
            const col3 = document.getElementById('col3');
            if (!col3.value.trim()) return;

            col3.select();
            col3.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(col3.value).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHTML = btn.innerHTML;
                
                btn.classList.replace('bg-emerald-500', 'bg-slate-700');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-slate-800');
                btn.innerHTML = '✓ Berhasil disalin!';
                
                setTimeout(() => {
                    btn.classList.replace('bg-slate-700', 'bg-emerald-500');
                    btn.classList.replace('hover:bg-slate-800', 'hover:bg-emerald-600');
                    btn.innerHTML = originalHTML;
                }, 2000);
            });
        }
    </script>
</body>
</html>
